version: 2
updates:

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  - package-ecosystem: "composer"
    directory: "/packages/core"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  - package-ecosystem: "composer"
    directory: "/packages/recorder"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  - package-ecosystem: "composer"
    directory: "/packages/dashboard"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/packages/dashboard"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
