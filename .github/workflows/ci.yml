name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────
  # PHP quality — runs once per package matrix entry
  # ────────────────────────────────────────────────────────────
  php-quality:
    name: "PHP Quality · ${{ matrix.package }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package: [core, recorder, dashboard]
        php: ["8.4"]

    defaults:
      run:
        working-directory: packages/${{ matrix.package }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_sqlite, sqlite3, pcov
          coverage: pcov
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: packages/${{ matrix.package }}/vendor
          key: composer-${{ matrix.package }}-${{ matrix.php }}-${{ hashFiles(format('packages/{0}/composer.lock', matrix.package)) }}
          restore-keys: composer-${{ matrix.package }}-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Check formatting (Pint)
        run: vendor/bin/pint --test

      - name: Check refactoring (Rector dry-run)
        run: vendor/bin/rector process --dry-run --no-progress-bar

      - name: Static analysis (PHPStan / Larastan)
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=256M

      - name: Run tests with coverage
        run: vendor/bin/pest --coverage --min=70 --ci

      - name: Type coverage (100% required)
        run: vendor/bin/pest --type-coverage --min=100

      - name: Upload coverage to Codecov
        if: matrix.php == '8.4'
        uses: codecov/codecov-action@v5
        with:
          files: packages/${{ matrix.package }}/build/coverage/clover.xml
          flags: ${{ matrix.package }}
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ────────────────────────────────────────────────────────────
  # PHP — cross-version compatibility check (no coverage)
  # ────────────────────────────────────────────────────────────
  php-compat:
    name: "PHP Compat · ${{ matrix.package }} · PHP ${{ matrix.php }}"
    runs-on: ubuntu-latest
    needs: php-quality

    strategy:
      fail-fast: false
      matrix:
        package: [core, recorder, dashboard]
        php: ["8.5"]

    defaults:
      run:
        working-directory: packages/${{ matrix.package }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_sqlite, sqlite3
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --ignore-platform-req=php+

      - name: Run tests (no coverage)
        run: vendor/bin/pest --ci

  # ────────────────────────────────────────────────────────────
  # Frontend — format, lint, typecheck, build
  # ────────────────────────────────────────────────────────────
  frontend:
    name: "Frontend · dashboard assets"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/dashboard

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: packages/dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Lint TypeScript (oxlint)
        run: npm run lint

      - name: Type check (tsc)
        run: npm run typecheck

      - name: Production build
        run: NODE_ENV=production npm run build

      - name: Assert dist/ was committed and is up-to-date
        run: |
          if [[ -n "$(git diff --name-only dist/)" ]]; then
            echo "❌ dist/ is out of date. Run 'npm run build' and commit the result."
            git diff dist/
            exit 1
          fi
          echo "✅ dist/ is up to date."
