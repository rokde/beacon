name: Split Packages

on:
  push:
    tags:
      - 'v*'

# Require CI to pass before splitting
concurrency:
  group: split-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Build assets first so split includes compiled dist/
  build-assets:
    name: "Build dashboard assets"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: packages/dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: packages/dashboard

      - name: Production build
        run: NODE_ENV=production npm run build
        working-directory: packages/dashboard

      - name: Commit built assets if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/dashboard/dist/
          git diff --cached --quiet || git commit -m "chore: build assets for ${{ github.ref_name }} [skip ci]" && git push origin main

  split:
    name: "Split · ${{ matrix.package.local_path }}"
    runs-on: ubuntu-latest
    needs: build-assets

    strategy:
      fail-fast: false
      matrix:
        package:
          - local_path: packages/core
            split_repo: git@github.com:rokde/beacon-core.git
            deploy_key: CORE_DEPLOY_KEY
          - local_path: packages/recorder
            split_repo: git@github.com:rokde/beacon-recorder.git
            deploy_key: RECORDER_DEPLOY_KEY
          - local_path: packages/dashboard
            split_repo: git@github.com:rokde/beacon-dashboard.git
            deploy_key: DASHBOARD_DEPLOY_KEY

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: danharrin/monorepo-split-github-action@v2
        with:
          package_directory: ${{ matrix.package.local_path }}
          repository: ${{ matrix.package.split_repo }}
          branch: main
          tag: ${{ github.ref_name }}
          ssh_private_key: ${{ secrets[matrix.package.deploy_key] }}
